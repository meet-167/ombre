<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ombré Nail Salon</title>
    <!-- Suppress Tailwind CDN warning in console -->
    <script>
        const originalWarn = console.warn;
        console.warn = function () {
            if (typeof arguments[0] === 'string' && arguments[0].includes('cdn.tailwindcss.com')) return;
            originalWarn.apply(console, arguments);
        };
    </script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        // Set up the premium aesthetic colors
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        blush: {
                            50: '#fdf8f5',
                            100: '#f5ebe6',
                            200: '#eddccc',
                            500: '#c58a8a',
                            600: '#a95c68',
                            900: '#4a252a',
                        },
                        champagne: '#e5d3b3',
                        charcoal: '#2d2b2a'
                    },
                    fontFamily: {
                        sans: ['Lato', 'sans-serif'],
                        serif: ['Playfair Display', 'serif'],
                    }
                }
            }
        };
    </script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Lato:wght@300;400;700&display=swap');

        body {
            font-family: 'Lato', sans-serif;
            background-color: #fdf8f5;
            color: #2d2b2a;
        }

        h1,
        h2,
        h3,
        h4,
        h5,
        h6 {
            font-family: 'Playfair Display', serif;
        }

        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }

        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .animate-fade-in-up {
            animation: fadeInUp 0.5s ease-out forwards;
        }

        @keyframes float {

            0%,
            100% {
                transform: translateY(0);
            }

            50% {
                transform: translateY(-15px);
            }
        }

        .animate-float {
            animation: float 6s ease-in-out infinite;
        }

        .glass-nav {
            background: rgba(253, 248, 245, 0.85);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.5);
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.8);
            box-shadow: 0 8px 32px rgba(45, 43, 42, 0.05);
        }

        .hero-gradient {
            background: linear-gradient(135deg, #fdf8f5 0%, #f5ebe6 100%);
        }

        .btn-premium {
            background: linear-gradient(135deg, #a95c68 0%, #4a252a 100%);
            box-shadow: 0 4px 15px rgba(169, 92, 104, 0.3);
            transition: all 0.3s ease;
        }

        .btn-premium:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(169, 92, 104, 0.4);
        }
    </style>
</head>

<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // Initialize Firebase
        const firebaseConfig = {
            apiKey: "AIzaSyAcGh8gLianDDvVnkBQTzE2KEnHCVxAbPg",
            authDomain: "ombre-nail-salon.firebaseapp.com",
            projectId: "ombre-nail-salon",
            storageBucket: "ombre-nail-salon.firebasestorage.app",
            messagingSenderId: "410031020310",
            appId: "1:410031020310:web:a78744ffc62b7ec7ff9837",
            measurementId: "G-L5LZX8SSX3"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const TOTAL_IMAGES = 50;
        const IMAGE_BASE_URL = "https://meet-167.github.io/ombre/images/";
        // Lucide Icons as SVG components
        const Sparkles = ({ className = "w-6 h-6" }) => (
            <svg className={className} fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M5 3v4M3 5h4M6 17v4m-2-2h4m5-16l2.286 6.857L21 12l-5.714 2.143L13 21l-2.286-6.857L5 12l5.714-2.143L13 3z" />
            </svg>
        );

        const Lock = ({ className = "w-6 h-6" }) => (
            <svg className={className} fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" />
            </svg>
        );

        const Loader2 = ({ className = "w-6 h-6" }) => (
            <svg className={`${className} animate-spin`} fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" />
            </svg>
        );

        const Search = ({ className = "w-6 h-6" }) => (
            <svg className={className} fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
            </svg>
        );

        const Plus = ({ className = "w-6 h-6" }) => (
            <svg className={className} fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 4v16m8-8H4" />
            </svg>
        );

        const Edit = ({ className = "w-6 h-6" }) => (
            <svg className={className} fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z" />
            </svg>
        );

        const Trash2 = ({ className = "w-6 h-6" }) => (
            <svg className={className} fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
            </svg>
        );

        const X = ({ className = "w-6 h-6" }) => (
            <svg className={className} fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M6 18L18 6M6 6l12 12" />
            </svg>
        );

        // Database Service using Firestore
        const DB = {
            checkLogin: async (password) => {
                try {
                    const docRef = db.collection('credentials').doc('password');
                    const doc = await docRef.get();
                    if (doc.exists) {
                        const storedPassword = doc.data().password;
                        return password === storedPassword;
                    }
                    console.error('Password document does not exist');
                    return false;
                } catch (error) {
                    console.error('Error checking password:', error);
                    alert('Error checking password. Check console for details.');
                    return false;
                }
            },

            getDesigns: async () => {
                try {
                    const snapshot = await db.collection('designs').orderBy('createdAt', 'desc').get();
                    return snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                } catch (error) {
                    console.error('Error getting designs:', error);
                    alert('Error loading designs. Check Firestore rules.');
                    return [];
                }
            },

            saveDesign: async (design) => {
                try {
                    const docRef = await db.collection('designs').add(design);
                    return { ...design, id: docRef.id };
                } catch (error) {
                    console.error('Error saving design:', error);
                    alert('Error saving design. Check Firestore rules - write permission needed.');
                    throw error;
                }
            },

            updateDesign: async (design) => {
                try {
                    const { id, ...data } = design;
                    await db.collection('designs').doc(id).update(data);
                    return design;
                } catch (error) {
                    console.error('Error updating design:', error);
                    alert('Error updating design. Check Firestore rules.');
                    throw error;
                }
            },

            deleteDesign: async (id) => {
                try {
                    await db.collection('designs').doc(id).delete();
                } catch (error) {
                    console.error('Error deleting design:', error);
                    alert('Error deleting design. Check Firestore rules.');
                    throw error;
                }
            },

            getSeasonalConfig: async () => {
                try {
                    const docRef = db.collection('config').doc('seasonal');
                    const doc = await docRef.get();
                    if (doc.exists) {
                        return doc.data();
                    }
                    return { isActive: false, eventName: '' };
                } catch (error) {
                    console.error('Error getting seasonal config:', error);
                    return { isActive: false, eventName: '' };
                }
            },

            saveSeasonalConfig: async (config) => {
                try {
                    await db.collection('config').doc('seasonal').set(config);
                    return config;
                } catch (error) {
                    console.error('Error saving seasonal config:', error);
                    alert('Error saving seasonal config. Check Firestore rules.');
                    throw error;
                }
            }
        };

        // Constants
        const COLORS = [
            "Red", "Blue", "Pink", "Nude", "Black", "White", "Gold", "Silver", "Purple", "Green", "Orange", "Yellow", "Multicolor"
        ];

        const SERVICE_TYPES = [
            "Gel Polish", "Toe Gel Polish", "Gel Overlay", "Semi Extension",
            "Gel Extension", "Soft Gel Extension", "Refilling"
        ];

        const STYLES = [
            "Ombre", "French", "Glitter", "Matte", "3D Art", "Minimalist", "Chrome", "Abstract", "Floral"
        ];

        // Helper: auto-generate image list from repo
        const getAllRepoImages = (total = 50) => {
            const base = "https://meet-167.github.io/ombre/images/";
            const arr = [];
            for (let i = 1; i <= total; i++) {
                arr.push(`${base}img${i}.png`);
            }
            return arr;
        };


        // Header Component
        const Header = ({ onAdminClick, onHomeClick }) => (
            <header className="glass-nav sticky top-0 z-50 transition-all duration-300">
                <div className="container mx-auto px-6 py-4 flex justify-between items-center">
                    <button onClick={onHomeClick} className="flex items-center gap-3 hover:opacity-80 transition group">
                        <div className="bg-blush-100 p-2 rounded-full group-hover:bg-champagne transition-colors duration-300">
                            <Sparkles className="w-6 h-6 text-blush-600 group-hover:text-charcoal transition-colors duration-300" />
                        </div>
                        <h1 className="text-3xl font-serif font-bold text-charcoal tracking-wide">Ombré<span className="text-blush-600 font-light italic">Studio</span></h1>
                    </button>
                    <button
                        onClick={onAdminClick}
                        className="text-charcoal hover:text-blush-600 transition-colors p-2 rounded-full hover:bg-blush-100 focus:outline-none"
                    >
                        <Lock className="w-5 h-5" />
                    </button>
                </div>
            </header>
        );

        // Hero Component
        const HeroSection = () => (
            <div className="relative pt-24 pb-32 flex items-center justify-center overflow-hidden hero-gradient border-b border-white/50 shadow-sm">
                <div className="absolute inset-0 z-0 opacity-40 mix-blend-multiply pointer-events-none">
                    <div className="absolute top-0 -left-1/4 w-[500px] h-[500px] bg-champagne rounded-full filter blur-[100px] animate-float"></div>
                    <div className="absolute bottom-0 -right-1/4 w-[500px] h-[500px] bg-blush-200 rounded-full filter blur-[100px] animate-float" style={{ animationDelay: '3s' }}></div>
                </div>

                <div className="relative z-10 text-center max-w-3xl mx-auto px-6 animate-fade-in-up">
                    <span className="text-blush-600 font-semibold tracking-[0.2em] uppercase text-xs mb-6 block">Welcome to Luxury</span>
                    <h2 className="text-5xl md:text-7xl font-serif text-charcoal mb-6 leading-tight">Elevate Your <span className="italic font-light">Style</span></h2>
                    <p className="text-lg md:text-xl text-charcoal/70 mb-10 max-w-xl mx-auto font-light leading-relaxed">
                        Discover meticulous artistry and premium care. Find your perfect nail design from our curated studio collection.
                    </p>
                    <button
                        onClick={() => document.getElementById('gallery').scrollIntoView({ behavior: 'smooth' })}
                        className="btn-premium text-white px-8 py-4 rounded-full font-medium tracking-wide flex items-center gap-3 mx-auto uppercase text-sm"
                    >
                        Explore Gallery
                        <svg className="w-4 h-4 animate-bounce" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M19 14l-7 7m0 0l-7-7m7 7V3" /></svg>
                    </button>
                </div>
            </div>
        );

        // Client View Component
        const ClientView = ({ designs, seasonalConfig }) => {
            const [searchTerm, setSearchTerm] = useState('');
            const [selectedColor, setSelectedColor] = useState('');
            const [selectedService, setSelectedService] = useState('');
            const [selectedStyle, setSelectedStyle] = useState('');


            const filteredDesigns = designs.filter(design => {
                const title = design.title || '';
                const tags = design.tags || [];
                const matchesSearch = title.toLowerCase().includes(searchTerm.toLowerCase()) ||
                    tags.some(tag => tag.toLowerCase().includes(searchTerm.toLowerCase()));
                const matchesColor = !selectedColor || design.color === selectedColor;
                const matchesService = !selectedService || design.category === selectedService;
                const matchesStyle = !selectedStyle || tags.includes(selectedStyle);
                return matchesSearch && matchesColor && matchesService && matchesStyle;
            });

            const seasonalDesigns = filteredDesigns.filter(d => d.isSeasonal);
            const regularDesigns = filteredDesigns.filter(d => !d.isSeasonal);

            return (
                <div className="flex flex-col min-h-screen">
                    <HeroSection />

                    <main id="gallery" className="container mx-auto px-6 py-16 flex-1">
                        {/* Search and Filters */}
                        <div className="max-w-5xl mx-auto shadow-sm rounded-3xl p-6 mb-16 space-y-6 glass-card relative z-20 -mt-24">
                            <div className="relative group">
                                <Search className="absolute left-6 top-4 text-blush-600 w-5 h-5 transition-transform group-focus-within:scale-110" />
                                <input
                                    type="text"
                                    placeholder="Search by name, style, or tag..."
                                    value={searchTerm}
                                    onChange={(e) => setSearchTerm(e.target.value)}
                                    className="w-full pl-14 pr-6 py-4 rounded-2xl bg-white border border-blush-100 focus:border-blush-500 focus:ring-4 focus:ring-blush-100 outline-none transition-all placeholder:text-gray-400 font-light text-charcoal shadow-inner"
                                />
                            </div>

                            <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                                <div className="relative">
                                    <select
                                        value={selectedStyle}
                                        onChange={(e) => setSelectedStyle(e.target.value)}
                                        className="w-full appearance-none bg-white border border-blush-100 focus:border-blush-500 focus:ring-4 focus:ring-blush-100 outline-none transition-all rounded-2xl px-6 py-3 text-charcoal font-light shadow-sm"
                                    >
                                        <option value="">All Styles</option>
                                        {STYLES.map(style => (
                                            <option key={style} value={style}>{style}</option>
                                        ))}
                                    </select>
                                    <div className="pointer-events-none absolute inset-y-0 right-0 flex items-center px-4 text-blush-600">
                                        <svg className="fill-current h-4 w-4" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20"><path d="M9.293 12.95l.707.707L15.657 8l-1.414-1.414L10 10.828 5.757 6.586 4.343 8z" /></svg>
                                    </div>
                                </div>

                                <div className="relative">
                                    <select
                                        value={selectedColor}
                                        onChange={(e) => setSelectedColor(e.target.value)}
                                        className="w-full appearance-none bg-white border border-blush-100 focus:border-blush-500 focus:ring-4 focus:ring-blush-100 outline-none transition-all rounded-2xl px-6 py-3 text-charcoal font-light shadow-sm"
                                    >
                                        <option value="">All Colors</option>
                                        {COLORS.map(color => (
                                            <option key={color} value={color}>{color}</option>
                                        ))}
                                    </select>
                                    <div className="pointer-events-none absolute inset-y-0 right-0 flex items-center px-4 text-blush-600">
                                        <svg className="fill-current h-4 w-4" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20"><path d="M9.293 12.95l.707.707L15.657 8l-1.414-1.414L10 10.828 5.757 6.586 4.343 8z" /></svg>
                                    </div>
                                </div>

                                <div className="relative">
                                    <select
                                        value={selectedService}
                                        onChange={(e) => setSelectedService(e.target.value)}
                                        className="w-full appearance-none bg-white border border-blush-100 focus:border-blush-500 focus:ring-4 focus:ring-blush-100 outline-none transition-all rounded-2xl px-6 py-3 text-charcoal font-light shadow-sm"
                                    >
                                        <option value="">All Services</option>
                                        {SERVICE_TYPES.map(service => (
                                            <option key={service} value={service}>{service}</option>
                                        ))}
                                    </select>
                                    <div className="pointer-events-none absolute inset-y-0 right-0 flex items-center px-4 text-blush-600">
                                        <svg className="fill-current h-4 w-4" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20"><path d="M9.293 12.95l.707.707L15.657 8l-1.414-1.414L10 10.828 5.757 6.586 4.343 8z" /></svg>
                                    </div>
                                </div>
                            </div>
                        </div>

                        {/* Seasonal Collection */}
                        {seasonalConfig.isActive && seasonalDesigns.length > 0 && (
                            <section className="mb-20 max-w-7xl mx-auto">
                                <div className="flex items-center gap-4 mb-10">
                                    <div className="h-px bg-blush-200 flex-1"></div>
                                    <h2 className="text-4xl font-serif font-bold text-charcoal text-center tracking-wide">
                                        <span className="italic font-light text-blush-600 mr-2">The</span>
                                        {seasonalConfig.eventName}
                                    </h2>
                                    <div className="h-px bg-blush-200 flex-1"></div>
                                </div>
                                <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-10">
                                    {seasonalDesigns.map((design, i) => (
                                        <div key={design.id} className="animate-fade-in-up" style={{ animationDelay: `${i * 0.1}s` }}>
                                            <DesignCard design={design} />
                                        </div>
                                    ))}
                                </div>
                            </section>
                        )}

                        {/* Regular Gallery */}
                        <section className="max-w-7xl mx-auto">
                            <div className="flex items-center gap-4 mb-10">
                                <div className="h-px bg-charcoal/10 flex-1"></div>
                                <h2 className="text-3xl font-serif text-charcoal tracking-wide">Studio <span className="italic text-blush-600">Gallery</span></h2>
                                <div className="h-px bg-charcoal/10 flex-1"></div>
                            </div>

                            {regularDesigns.length === 0 ? (
                                <div className="text-center py-20 glass-card rounded-3xl max-w-2xl mx-auto">
                                    <Search className="w-12 h-12 text-blush-200 mx-auto mb-4" />
                                    <p className="text-xl text-charcoal/50 font-light">No designs match your elegant taste.</p>
                                    <p className="text-sm text-charcoal/40 mt-2">Try adjusting your filters.</p>
                                </div>
                            ) : (
                                <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-8">
                                    {regularDesigns.map((design, i) => (
                                        <div key={design.id} className="animate-fade-in-up" style={{ animationDelay: `${i * 0.05}s` }}>
                                            <DesignCard design={design} />
                                        </div>
                                    ))}
                                </div>
                            )}
                        </section>
                    </main>
                </div>
            );
        };

        // Design Card Component
        const DesignCard = ({ design }) => (
            <div className="group glass-card rounded-3xl overflow-hidden hover:shadow-2xl transition-all duration-500 hover:-translate-y-2 flex flex-col h-full bg-white/40">
                <div className="relative aspect-[4/5] bg-blush-50 overflow-hidden">
                    <img
                        src={design.imageUrl}
                        alt={design.title}
                        className="w-full h-full object-cover transition-transform duration-700 group-hover:scale-110"
                    />
                    <div className="absolute inset-0 bg-gradient-to-t from-charcoal/80 via-transparent to-transparent opacity-0 group-hover:opacity-100 transition-opacity duration-500"></div>
                </div>
                <div className="p-6 flex flex-col flex-1">
                    <div className="flex justify-between items-start mb-4">
                        <h3 className="text-xl font-serif font-bold text-charcoal group-hover:text-blush-600 transition-colors">{design.title}</h3>
                        <p className="text-2xl font-serif text-blush-600 font-light italic">₹{design.price} onwards</p>
                    </div>
                    <div className="flex flex-wrap gap-2 mt-auto pt-4 border-t border-charcoal/5">
                        {design.category && (
                            <span className="px-3 py-1 bg-champagne/40 text-charcoal font-medium text-xs rounded-full border border-champagne/60">
                                {design.category}
                            </span>
                        )}
                        {design.color && (
                            <span className="px-3 py-1 bg-blush-100 text-blush-900 font-medium text-xs rounded-full border border-blush-200">
                                {design.color}
                            </span>
                        )}
                        {(design.tags || []).map(tag => (
                            <span key={tag} className="px-3 py-1 bg-charcoal/5 text-charcoal/70 font-medium text-xs rounded-full border border-charcoal/10">
                                {tag}
                            </span>
                        ))}
                    </div>
                </div>
            </div>
        );

        // Admin View Component
        const AdminView = ({
            onLogout,
            onDesignAdded,
            onDesignUpdated,
            onDesignDeleted,
            designs,
            seasonalConfig,
            onConfigUpdate
        }) => {
            const [showForm, setShowForm] = useState(false);
            const [editingDesign, setEditingDesign] = useState(null);

            return (
                <main className="container mx-auto px-4 py-8">
                    <div className="flex justify-between items-center mb-8">
                        <h2 className="text-3xl font-bold text-slate-800">Admin Panel</h2>
                        <button
                            onClick={onLogout}
                            className="px-4 py-2 bg-slate-200 text-slate-700 rounded-lg hover:bg-slate-300"
                        >
                            Logout
                        </button>
                    </div>

                    {/* Seasonal Config */}
                    <SeasonalConfigForm
                        seasonalConfig={seasonalConfig}
                        onConfigUpdate={onConfigUpdate}
                    />

                    {/* Add Design Button */}
                    <button
                        onClick={() => {
                            setEditingDesign(null);
                            setShowForm(true);
                        }}
                        className="mb-6 px-6 py-3 bg-pink-600 text-white rounded-lg hover:bg-pink-700 flex items-center gap-2"
                    >
                        <Plus className="w-5 h-5" />
                        Add New Design
                    </button>

                    {/* Form Modal */}
                    {showForm && (
                        <DesignForm
                            design={editingDesign}
                            allDesigns={designs}
                            onClose={() => { setShowForm(false); setEditingDesign(null); }}
                            onSave={(design) => {
                                if (editingDesign) {
                                    onDesignUpdated(design);
                                } else {
                                    onDesignAdded(design);
                                }
                                setShowForm(false);
                                setEditingDesign(null);
                            }}
                        />
                    )}


                    {/* Designs List */}
                    <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                        {designs.map(design => (
                            <div key={design.id} className="bg-white rounded-xl shadow-lg overflow-hidden">
                                <div className="aspect-square bg-slate-100">
                                    <img
                                        src={design.imageUrl}
                                        alt={design.title}
                                        className="w-full h-full object-cover"
                                    />
                                </div>
                                <div className="p-4">
                                    <h3 className="text-xl font-bold text-slate-800 mb-2">{design.title}</h3>
                                    <p className="text-2xl font-bold text-pink-600 mb-3">₹{design.price} onwards</p>
                                    <div className="flex gap-2">
                                        <button
                                            onClick={() => {
                                                setEditingDesign(design);
                                                setShowForm(true);
                                            }}
                                            className="flex-1 px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 flex items-center justify-center gap-2"
                                        >
                                            <Edit className="w-4 h-4" />
                                            Edit
                                        </button>
                                        <button
                                            onClick={async () => {
                                                if (confirm('Delete this design?')) {
                                                    await DB.deleteDesign(design.id);
                                                    onDesignDeleted(design.id);
                                                }
                                            }}
                                            className="flex-1 px-4 py-2 bg-red-600 text-white rounded-lg hover:bg-red-700 flex items-center justify-center gap-2"
                                        >
                                            <Trash2 className="w-4 h-4" />
                                            Delete
                                        </button>
                                    </div>
                                </div>
                            </div>
                        ))}
                    </div>
                </main>
            );
        };

        const DesignForm = ({ design, onClose, onSave, allDesigns = [] }) => {
            // form state (do NOT reference selectedImage in init)
            const [formData, setFormData] = useState({
                title: design?.title || '',
                price: design?.price ?? '',
                imageUrl: design?.imageUrl || '',
                category: design?.category || '',
                color: design?.color || '',
                tags: design?.tags || [],
                isSeasonal: design?.isSeasonal || false
            });

            // selection state (keeps track visually)
            const [selectedImage, setSelectedImage] = useState(design?.imageUrl || '');

            // Build list of all repo images then filter out those already used
            const allImages = getAllRepoImages(TOTAL_IMAGES);
            const usedImages = allDesigns
                .filter(d => d.id !== design?.id) // allow current design's image if editing
                .map(d => d.imageUrl)
                .filter(Boolean);

            const availableImages = allImages.filter(img => !usedImages.includes(img) || img === design?.imageUrl);

            // keep formData.imageUrl in sync with selectedImage
            useEffect(() => {
                setFormData(prev => ({ ...prev, imageUrl: selectedImage }));
            }, [selectedImage]);

            const toggleTag = (tag) => {
                setFormData(prev => ({
                    ...prev,
                    tags: prev.tags.includes(tag) ? prev.tags.filter(t => t !== tag) : [...prev.tags, tag]
                }));
            };

            const handleSubmit = async (e) => {
                e.preventDefault();

                const finalImage = selectedImage || formData.imageUrl;
                if (!finalImage) return alert("Please select an image!");

                const payload = {
                    ...formData,
                    imageUrl: finalImage,
                    price: parseFloat(formData.price),
                    createdAt: design?.createdAt || Date.now()
                };

                try {
                    if (design) {
                        const updatedDesign = { ...payload, id: design.id };
                        await DB.updateDesign(updatedDesign);
                        onSave(updatedDesign);
                    } else {
                        const savedDesign = await DB.saveDesign(payload);
                        onSave(savedDesign);
                    }
                } catch (error) {
                    alert('Error saving design: ' + (error.message || error));
                }
            };

            return (
                <div className="fixed inset-0 bg-black/50 flex items-center justify-center p-4 z-50">
                    <div className="bg-white rounded-xl p-6 max-w-2xl w-full max-h-[90vh] overflow-y-auto">
                        <div className="flex justify-between items-center mb-6">
                            <h3 className="text-2xl font-bold text-slate-800">
                                {design ? 'Edit Design' : 'Add New Design'}
                            </h3>
                            <button onClick={onClose}><X className="w-6 h-6 text-slate-600" /></button>
                        </div>

                        <form onSubmit={handleSubmit} className="space-y-4">
                            <input
                                type="text"
                                placeholder="Title"
                                value={formData.title}
                                onChange={(e) => setFormData({ ...formData, title: e.target.value })}
                                className="w-full px-4 py-2 border rounded-lg"
                                required
                            />

                            <input
                                type="number"
                                placeholder="Starting price (in ₹)"
                                value={formData.price}
                                onChange={(e) => setFormData({ ...formData, price: e.target.value })}
                                className="w-full px-4 py-2 border rounded-lg"
                                required
                            />

                            {/* IMAGE SELECTION GRID */}
                            <div>
                                <label className="block text-sm font-medium text-slate-700 mb-2">
                                    Select Image from Repository
                                </label>

                                {availableImages.length === 0 && (
                                    <p className="text-red-600 text-sm mb-2">
                                        All images are already linked to designs.
                                    </p>
                                )}

                                <div className="grid grid-cols-3 gap-4 max-h-80 overflow-y-auto border p-2 rounded-lg">
                                    {availableImages.map((url) => (
                                        <div
                                            key={url}
                                            className={`cursor-pointer border rounded-lg overflow-hidden ${selectedImage === url ? "ring-4 ring-pink-500" : ""}`}
                                            onClick={() => setSelectedImage(url)}
                                        >
                                            <img src={url} className="w-full h-24 object-cover" />
                                        </div>
                                    ))}
                                </div>

                                {selectedImage && <p className="text-xs text-green-600 mt-2">Selected: {selectedImage.split('/').pop()}</p>}
                            </div>

                            <select
                                value={formData.category}
                                onChange={(e) => setFormData({ ...formData, category: e.target.value })}
                                className="w-full px-4 py-2 border rounded-lg"
                            >
                                <option value="">Select Service Type</option>
                                {SERVICE_TYPES.map(service => <option key={service} value={service}>{service}</option>)}
                            </select>

                            <select
                                value={formData.color}
                                onChange={(e) => setFormData({ ...formData, color: e.target.value })}
                                className="w-full px-4 py-2 border rounded-lg"
                            >
                                <option value="">Select Color</option>
                                {COLORS.map(color => (
                                    <option key={color} value={color}>{color}</option>
                                ))}
                            </select>

                            <div>
                                <label className="block text-sm font-medium text-slate-700 mb-2">Style Tags</label>
                                <div className="flex flex-wrap gap-2">
                                    {STYLES.map(style => (
                                        <button
                                            key={style}
                                            type="button"
                                            onClick={() => toggleTag(style)}
                                            className={`px-3 py-1 rounded-full text-sm ${formData.tags.includes(style) ? 'bg-pink-600 text-white' : 'bg-slate-100 text-slate-700'}`}
                                        >
                                            {style}
                                        </button>
                                    ))}
                                </div>
                            </div>

                            <label className="flex items-center gap-2">
                                <input
                                    type="checkbox"
                                    checked={formData.isSeasonal}
                                    onChange={(e) => setFormData({ ...formData, isSeasonal: e.target.checked })}
                                    className="w-4 h-4"
                                />
                                <span className="text-sm text-slate-700">Seasonal Design</span>
                            </label>

                            <button type="submit" className="w-full bg-pink-600 text-white py-3 rounded-lg hover:bg-pink-700">
                                {design ? 'Update Design' : 'Add Design'}
                            </button>
                        </form>
                    </div>
                </div>
            );
        };


        // Seasonal Config Form Component
        const SeasonalConfigForm = ({ seasonalConfig, onConfigUpdate }) => {
            const [config, setConfig] = useState(seasonalConfig);

            const handleSubmit = async (e) => {
                e.preventDefault();
                await DB.saveSeasonalConfig(config);
                onConfigUpdate(config);
            };

            return (
                <form onSubmit={handleSubmit} className="bg-white rounded-xl p-6 mb-6 shadow-lg">
                    <h3 className="text-xl font-bold text-slate-800 mb-4">Seasonal Collection</h3>
                    <div className="space-y-4">
                        <label className="flex items-center gap-2">
                            <input
                                type="checkbox"
                                checked={config.isActive}
                                onChange={(e) => setConfig({ ...config, isActive: e.target.checked })}
                                className="w-4 h-4"
                            />
                            <span className="text-sm text-slate-700">Enable Seasonal Collection</span>
                        </label>

                        <input
                            type="text"
                            placeholder="Event Name (e.g., Valentine's Day Collection)"
                            value={config.eventName}
                            onChange={(e) => setConfig({ ...config, eventName: e.target.value })}
                            className="w-full px-4 py-2 border rounded-lg"
                        />

                        <button
                            type="submit"
                            className="px-6 py-2 bg-slate-800 text-white rounded-lg hover:bg-slate-900"
                        >
                            Save Configuration
                        </button>
                    </div>
                </form>
            );
        };

        // Main App Component
        const App = () => {
            const [view, setView] = useState('client');
            const [designs, setDesigns] = useState([]);
            const [seasonalConfig, setSeasonalConfig] = useState({ isActive: false, eventName: '' });
            const [loading, setLoading] = useState(true);
            const [password, setPassword] = useState('');
            const [loginError, setLoginError] = useState(false);
            const [verifying, setVerifying] = useState(false);

            useEffect(() => {
                const fetchData = async () => {
                    setLoading(true);
                    const [fetchedDesigns, fetchedConfig] = await Promise.all([
                        DB.getDesigns(),
                        DB.getSeasonalConfig()
                    ]);
                    setDesigns(fetchedDesigns);
                    setSeasonalConfig(fetchedConfig);
                    setLoading(false);
                };
                fetchData();
            }, []);

            const handleLogin = async (e) => {
                e.preventDefault();
                setVerifying(true);
                const isValid = await DB.checkLogin(password);
                setVerifying(false);

                if (isValid) {
                    setView('admin');
                    setPassword('');
                    setLoginError(false);
                } else {
                    setLoginError(true);
                }
            };

            if (loading) {
                return (
                    <div className="min-h-screen flex items-center justify-center bg-rose-50">
                        <Loader2 className="w-8 h-8 text-pink-600" />
                    </div>
                );
            }

            return (
                <div className="min-h-screen bg-rose-50/30">
                    <Header
                        onAdminClick={() => setView(view === 'admin' ? 'client' : 'login')}
                        onHomeClick={() => setView('client')}
                    />

                    {view === 'client' && (
                        <ClientView designs={designs} seasonalConfig={seasonalConfig} />
                    )}

                    {view === 'login' && (
                        <div className="min-h-screen flex items-center justify-center px-4">
                            <div className="glass-card p-10 rounded-[2rem] shadow-2xl w-full max-w-md animate-fade-in-up border border-white relative overflow-hidden">
                                <div className="absolute top-0 right-0 -mt-10 -mr-10 w-40 h-40 bg-blush-200 rounded-full filter blur-3xl opacity-50"></div>
                                <div className="absolute bottom-0 left-0 -mb-10 -ml-10 w-40 h-40 bg-champagne rounded-full filter blur-3xl opacity-50"></div>

                                <div className="text-center mb-8 relative z-10">
                                    <div className="bg-white/80 w-16 h-16 rounded-full flex items-center justify-center mx-auto mb-4 shadow-sm border border-blush-100">
                                        <Lock className="w-8 h-8 text-blush-600" />
                                    </div>
                                    <h2 className="text-3xl font-serif font-bold text-charcoal">Studio Access</h2>
                                    <p className="text-charcoal/50 text-sm mt-2 font-light">Enter artist passphrase</p>
                                </div>

                                <form onSubmit={handleLogin} className="space-y-6 relative z-10">
                                    <div>
                                        <input
                                            type="password"
                                            value={password}
                                            onChange={(e) => setPassword(e.target.value)}
                                            className="w-full px-5 py-4 rounded-2xl bg-white/80 border border-blush-100 focus:border-blush-500 focus:ring-4 focus:ring-blush-100 outline-none transition-all placeholder:text-gray-400 font-light text-charcoal focus:bg-white"
                                            placeholder="Password"
                                            autoFocus
                                        />
                                        {loginError && <p className="text-red-500 text-xs mt-2 pl-2">Incorrect password. Please try again.</p>}
                                    </div>

                                    <button
                                        type="submit"
                                        disabled={verifying}
                                        className="btn-premium w-full text-white font-medium tracking-wide py-4 rounded-2xl flex justify-center items-center text-sm uppercase"
                                    >
                                        {verifying ? <Loader2 className="w-5 h-5" /> : "Unlock"}
                                    </button>
                                </form>
                                <button
                                    onClick={() => setView('client')}
                                    className="w-full mt-6 text-charcoal/40 text-sm hover:text-blush-600 transition-colors uppercase tracking-widest font-semibold relative z-10"
                                >
                                    Return to Gallery
                                </button>
                            </div>
                        </div>
                    )}

                    {view === 'admin' && (
                        <AdminView
                            onLogout={() => setView('client')}
                            onDesignAdded={(design) => setDesigns(prev => [design, ...prev])}
                            onDesignUpdated={(design) => setDesigns(prev => prev.map(d => d.id === design.id ? design : d))}
                            onDesignDeleted={(id) => setDesigns(prev => prev.filter(d => d.id !== id))}
                            designs={designs}
                            seasonalConfig={seasonalConfig}
                            onConfigUpdate={setSeasonalConfig}
                        />
                    )}
                </div>
            );
        };

        // Render the app
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>

</html>
