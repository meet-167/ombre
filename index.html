    <!-- Suppress Tailwind CDN warning in console -->
    <script>
        const originalWarn = console.warn;
        console.warn = function () {
            if (typeof arguments[0] === 'string' && arguments[0].includes('cdn.tailwindcss.com')) return;
            originalWarn.apply(console, arguments);
        };
    </script>
    <script src="https://cdn.tailwindcss.com"></script>

        body {

            animation: fadeInUp 0.5s ease-out forwards;

        @keyframes float {

            0%,

            50% {
                transform: translateY(-15px);
            }

        .animate-float {
            animation: float 6s ease-in-out infinite;
        }

        .glass-nav {
            background: rgba(5, 4, 4, 0.85);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-bottom: 1px solid rgba(212, 175, 55, 0.2);

        .glass-card {
            background: rgba(17, 16, 16, 0.7);

        .hero-gradient {
            background: radial-gradient(circle at center, #111010 0%, #050404 100%);

        .btn-premium {

        .btn-premium:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(212, 175, 55, 0.4);

        .gold-glow {

</head>

<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // Initialize Firebase
        const firebaseConfig = {
            apiKey: "AIzaSyAcGh8gLianDDvVnkBQTzE2KEnHCVxAbPg",
            authDomain: "ombre-nail-salon.firebaseapp.com",
            projectId: "ombre-nail-salon",
            storageBucket: "ombre-nail-salon.firebasestorage.app",
            messagingSenderId: "410031020310",
            appId: "1:410031020310:web:a78744ffc62b7ec7ff9837",
            measurementId: "G-L5LZX8SSX3"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const TOTAL_IMAGES = 50;
        const IMAGE_BASE_URL = "https://meet-167.github.io/ombre/img";
        // Lucide Icons as SVG components
        const Sparkles = ({ className = "w-6 h-6" }) => (
            <svg className={className} fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M5 3v4M3 5h4M6 17v4m-2-2h4m5-16l2.286 6.857L21 12l-5.714 2.143L13 21l-2.286-6.857L5 12l5.714-2.143L13 3z" />
            </svg>
        );

        const Lock = ({ className = "w-6 h-6" }) => (
            <svg className={className} fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" />
            </svg>
        );

        const Loader2 = ({ className = "w-6 h-6" }) => (
            <svg className={`${className} animate-spin`} fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" />
            </svg>
        );

        const Search = ({ className = "w-6 h-6" }) => (
            <svg className={className} fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
            </svg>
        );

        const Plus = ({ className = "w-6 h-6" }) => (
            <svg className={className} fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 4v16m8-8H4" />
            </svg>
        );

        const Edit = ({ className = "w-6 h-6" }) => (
            <svg className={className} fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z" />
            </svg>
        );

        const Trash2 = ({ className = "w-6 h-6" }) => (
            <svg className={className} fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
            </svg>
        );

        const X = ({ className = "w-6 h-6" }) => (
            <svg className={className} fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M6 18L18 6M6 6l12 12" />
            </svg>
        );

        // Database Service using Firestore
        const DB = {
            checkLogin: async (password) => {
                try {
                    const docRef = db.collection('credentials').doc('password');
                    const doc = await docRef.get();
                    if (doc.exists) {
                        const storedPassword = doc.data().password;
                        return password === storedPassword;
                    }
                    console.error('Password document does not exist');
                    return false;
                } catch (error) {
                    console.error('Error checking password:', error);
                    alert('Error checking password. Check console for details.');
                    return false;
                }
            },

            getDesigns: async () => {
                try {
                    const snapshot = await db.collection('designs').orderBy('createdAt', 'desc').get();
                    return snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                } catch (error) {
                    console.error('Error getting designs:', error);
                    alert('Error loading designs. Check Firestore rules.');
                    return [];
                }
            },

            saveDesign: async (design) => {
                try {
                    const docRef = await db.collection('designs').add(design);
                    return { ...design, id: docRef.id };
                } catch (error) {
                    console.error('Error saving design:', error);
                    alert('Error saving design. Check Firestore rules - write permission needed.');
                    throw error;
                }
            },

            updateDesign: async (design) => {
                try {
                    const { id, ...data } = design;
                    await db.collection('designs').doc(id).update(data);
                    return design;
                } catch (error) {
                    console.error('Error updating design:', error);
                    alert('Error updating design. Check Firestore rules.');
                    throw error;
                }
            },

            deleteDesign: async (id) => {
                try {
                    await db.collection('designs').doc(id).delete();
                } catch (error) {
                    console.error('Error deleting design:', error);
                    alert('Error deleting design. Check Firestore rules.');
                    throw error;
                }
            },

            getSeasonalConfig: async () => {
                try {
                    const docRef = db.collection('config').doc('seasonal');
                    const doc = await docRef.get();
                    if (doc.exists) {
                        return doc.data();
                    }
                    return { isActive: false, eventName: '' };
                } catch (error) {
                    console.error('Error getting seasonal config:', error);
                    return { isActive: false, eventName: '' };
                }
            },

            saveSeasonalConfig: async (config) => {
                try {
                    await db.collection('config').doc('seasonal').set(config);
                    return config;
                } catch (error) {
                    console.error('Error saving seasonal config:', error);
                    alert('Error saving seasonal config. Check Firestore rules.');
                    throw error;
                }
            }
        };

        // Constants
        const COLORS = [
            "Red", "Blue", "Pink", "Nude", "Black", "White", "Gold", "Silver", "Purple", "Green", "Orange", "Yellow", "Multicolor"
        ];

        const SERVICE_TYPES = [
            "Gel Polish", "Toe Gel Polish", "Gel Overlay", "Semi Extension",
            "Gel Extension", "Soft Gel Extension", "Refilling"
        ];

        const STYLES = [
            "Ombre", "French", "Glitter", "Matte", "3D Art", "Minimalist", "Chrome", "Abstract", "Floral"
        ];

        // Helper: auto-generate image list from repo
        const getAllRepoImages = (total = 50) => {
            const base = "https://meet-167.github.io/ombre/img/";
            const arr = [];
            for (let i = 1; i <= total; i++) {
                arr.push(`${base}img${i}.jpg`);
            }
            return arr;
        };


        // Header Component
        const Header = ({ onAdminClick, onHomeClick }) => (
            <header className="glass-nav sticky top-0 z-50 transition-all duration-300">
                <div className="container mx-auto px-4 md:px-6 py-4 flex justify-between items-center">
                    <button onClick={onHomeClick} className="flex flex-col items-start hover:opacity-80 transition group">
                        <div className="flex items-center gap-2 md:gap-3">
                            <Sparkles className="w-5 h-5 md:w-6 md:h-6 text-gold-500 group-hover:text-gold-300 transition-colors duration-300" />
                            <h1 className="text-xl md:text-3xl font-serif font-bold text-gold-100 tracking-widest uppercase">
                                The Ombré <span className="text-gold-500 font-light">Nail Bar</span>
                            </h1>
                        </div>
                        <span className="font-script text-gold-300 text-xl md:text-2xl mt-1 md:mt-2 ml-7 md:ml-9 drop-shadow-md tracking-wider">
                            By Labdhi
                        </span>
                    </button>
                    <button
                        onClick={onAdminClick}
                        className="text-gold-500 hover:text-gold-300 transition-colors p-2 rounded-full hover:bg-gold-900/20 focus:outline-none"
                    >
                        <Lock className="w-5 h-5 md:w-6 md:h-6" />
                    </button>
                </div>
            </header>
        );

        // Hero Component
        const HeroSection = () => (
            <div className="relative pt-16 pb-24 md:pt-24 md:pb-32 flex items-center justify-center overflow-hidden hero-gradient border-b-[3px] border-gold-900/50 shadow-2xl">
                {/* Simulated Floral Corner Blurs */}
                <div className="absolute inset-0 z-0 opacity-60 mix-blend-screen pointer-events-none">
                    <div className="absolute -top-[150px] -left-[150px] md:-left-1/4 md:-top-1/4 w-[400px] md:w-[600px] h-[400px] md:h-[600px] bg-floral-700 rounded-full filter blur-[120px] animate-float"></div>
                    <div className="absolute -bottom-[150px] -right-[150px] md:-bottom-1/4 md:-right-1/4 w-[400px] md:w-[600px] h-[400px] md:h-[600px] bg-floral-500 rounded-full filter blur-[120px] animate-float" style={{ animationDelay: '3s' }}></div>
                </div>

                {/* Thin gold inner frame for premium look */}
                <div className="absolute inset-4 md:inset-8 border border-gold-500/30 pointer-events-none z-10 hidden sm:block"></div>

                <div className="relative z-20 text-center max-w-4xl mx-auto px-4 md:px-6 animate-fade-in-up">
                    <span className="text-gold-500 font-semibold tracking-[0.3em] md:tracking-[0.4em] uppercase text-xs md:text-sm mb-6 block drop-shadow">Welcome to Luxury</span>
                    <h2 className="text-5xl sm:text-6xl md:text-8xl font-serif text-gold-100 mb-2 leading-tight uppercase font-bold text-shadow">
                        The Ombré
                    </h2>
                    <h3 className="text-2xl sm:text-3xl md:text-5xl font-serif text-gold-300 mb-8 tracking-[0.2em] md:tracking-[0.3em] font-light uppercase">
                        Nail Bar
                    </h3>
                    <p className="text-base md:text-xl text-gold-100/70 mb-10 max-w-2xl mx-auto font-light leading-relaxed">
                        Discover meticulous artistry and premium care. Find your perfect nail design from our curated luxury collection.
                    </p>
                    <button
                        onClick={() => document.getElementById('gallery').scrollIntoView({ behavior: 'smooth' })}
                        className="btn-premium px-8 py-4 rounded-full font-bold tracking-widest flex items-center gap-3 mx-auto uppercase text-xs md:text-sm"
                    >
                        Explore Gallery
                        <svg className="w-4 h-4 animate-bounce" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M19 14l-7 7m0 0l-7-7m7 7V3" /></svg>
                    </button>
                </div>
            </div>
        );

        // Modal Component
        const DesignModal = ({ design, onClose }) => {
            if (!design) return null;
            return (
                <div className="fixed inset-0 bg-black/90 backdrop-blur-md flex items-center justify-center p-4 z-[60]" onClick={onClose}>
                    <div className="bg-darkgray border border-gold-900/30 rounded-3xl max-w-4xl w-full max-h-[90vh] overflow-hidden shadow-[0_0_50px_rgba(212,175,55,0.15)] flex flex-col md:flex-row animate-fade-in-up" onClick={e => e.stopPropagation()}>
                        <div className="w-full md:w-1/2 h-64 md:h-auto bg-blackbg relative flex items-center justify-center border-b md:border-b-0 md:border-r border-gold-900/30">
                            <button onClick={onClose} className="absolute top-4 right-4 z-10 bg-blackbg/50 p-2 rounded-full md:hidden text-gold-500 hover:text-gold-300">
                                <X className="w-6 h-6" />
                            </button>
                            <img src={design.imageUrl} alt={design.title} className="w-full h-full object-contain" />
                        </div>
                        <div className="w-full md:w-1/2 p-6 md:p-10 flex flex-col overflow-y-auto no-scrollbar">
                            <div className="hidden md:flex justify-end mb-4">
                                <button onClick={onClose} className="text-gold-500/50 hover:text-gold-300 transition-colors">
                                    <X className="w-8 h-8 hover:scale-110 transition-transform" />
                                </button>
                            </div>
                            <div className="flex-1">
                                <span className="text-gold-500/70 text-xs font-bold tracking-[0.2em] uppercase block mb-2">Design Details</span>
                                <h2 className="text-3xl md:text-4xl font-serif font-bold text-gold-100 mb-4">{design.title}</h2>
                                <p className="text-2xl md:text-3xl font-serif text-gold-500 mb-6 font-bold pb-6 border-b border-gold-900/20">₹{design.price} <span className="text-sm font-sans font-light text-gold-500/70">onwards</span></p>

                                <div className="space-y-6">
                                    {design.category && (
                                        <div>
                                            <span className="text-gold-500/70 text-xs uppercase tracking-widest block mb-2">Service Type</span>
                                            <span className="inline-block px-4 py-2 bg-gold-900/20 text-gold-300 border border-gold-500/20 rounded-xl font-medium">{design.category}</span>
                                        </div>
                                    )}
                                    {design.color && (
                                        <div>
                                            <span className="text-gold-500/70 text-xs uppercase tracking-widest block mb-2">Color Palette</span>
                                            <span className="inline-flex items-center gap-2 px-4 py-2 bg-darkgray text-gold-100/90 border border-gold-900/30 rounded-xl font-medium">
                                                <span className="w-3 h-3 rounded-full border border-gold-900/50 block" style={{ backgroundColor: design.color.toLowerCase() }}></span>
                                                {design.color}
                                            </span>
                                        </div>
                                    )}
                                    {design.tags && design.tags.length > 0 && (
                                        <div>
                                            <span className="text-gold-500/70 text-xs uppercase tracking-widest block mb-3">Style Elements</span>
                                            <div className="flex flex-wrap gap-2">
                                                {design.tags.map(tag => (
                                                    <span key={tag} className="px-4 py-2 bg-blackbg text-gold-100/70 border border-gold-900/30 rounded-xl font-medium hover:border-gold-500/50 hover:text-gold-300 transition-colors">
                                                        {tag}
                                                    </span>
                                                ))}
                                            </div>
                                        </div>
                                    )}
                                </div>
                            </div>
                            <button className="w-full mt-10 btn-premium py-4 rounded-xl font-bold uppercase tracking-widest text-sm" onClick={() => alert("Booking functionality coming soon!")}>
                                Book This Design
                            </button>
                        </div>
                    </div>
                </div>
            );
        };

        // Client View Component
        const ClientView = ({ designs, seasonalConfig }) => {
            const [searchTerm, setSearchTerm] = useState('');
            const [selectedColor, setSelectedColor] = useState('');
            const [selectedService, setSelectedService] = useState('');
            const [selectedStyle, setSelectedStyle] = useState('');
            const [selectedDesign, setSelectedDesign] = useState(null);


            const filteredDesigns = designs.filter(design => {
                const title = design.title || '';
                const tags = design.tags || [];
                const matchesSearch = title.toLowerCase().includes(searchTerm.toLowerCase()) ||
                    tags.some(tag => tag.toLowerCase().includes(searchTerm.toLowerCase()));
                const matchesColor = !selectedColor || design.color === selectedColor;
                const matchesService = !selectedService || design.category === selectedService;
                const matchesStyle = !selectedStyle || tags.includes(selectedStyle);
                return matchesSearch && matchesColor && matchesService && matchesStyle;
            });

            const seasonalDesigns = filteredDesigns.filter(d => d.isSeasonal);
            const regularDesigns = filteredDesigns.filter(d => !d.isSeasonal);

            return (
                <div className="flex flex-col min-h-screen">
                    <HeroSection />

                    <main id="gallery" className="container mx-auto px-6 py-16 flex-1">
                        {/* Search and Filters */}
                        <div className="max-w-5xl mx-auto shadow-2xl rounded-3xl p-4 md:p-8 mb-16 space-y-4 md:space-y-6 glass-card relative z-20 -mt-16 md:-mt-24 border border-gold-900/30">
                            <div className="relative">
                                <Search className="absolute left-4 top-1/2 w-6 h-6 transform -translate-y-1/2 text-gold-500/50 pointer-events-none" />
                                <input
                                    type="text"
                                    placeholder="Search luxury designs..."
                                    value={searchTerm}
                                    onChange={(e) => setSearchTerm(e.target.value)}
                                    className="w-full pl-12 pr-4 py-4 md:py-5 bg-darkgray/80 border border-gold-900/30 rounded-2xl focus:ring-2 focus:ring-gold-500/50 outline-none text-gold-100 placeholder-gold-500/40 text-sm md:text-base transition-all font-light"
                                />
                            </div>

                            <div className="grid grid-cols-1 sm:grid-cols-3 gap-4">
                                <div className="relative">
                                    <select
                                        value={selectedColor}
                                        onChange={(e) => setSelectedColor(e.target.value)}
                                        className="w-full appearance-none px-4 py-3 md:py-4 bg-darkgray/80 border border-gold-900/30 rounded-xl focus:ring-2 focus:ring-gold-500/50 outline-none text-gold-100 text-sm md:text-base font-light"
                                    >
                                        <option value="">All Colors</option>
                                        {COLORS.map(color => (
                                            <option key={color} value={color} className="bg-darkgray">{color}</option>
                                        ))}
                                    </select>
                                    <div className="pointer-events-none absolute inset-y-0 right-0 flex items-center px-4 text-gold-500">
                                        <svg className="fill-current h-4 w-4" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20"><path d="M9.293 12.95l.707.707L15.657 8l-1.414-1.414L10 10.828 5.757 6.586 4.343 8z" /></svg>
                                    </div>
                                </div>

                                <div className="relative">
                                    <select
                                        value={selectedService}
                                        onChange={(e) => setSelectedService(e.target.value)}
                                        className="w-full appearance-none px-4 py-3 md:py-4 bg-darkgray/80 border border-gold-900/30 rounded-xl focus:ring-2 focus:ring-gold-500/50 outline-none text-gold-100 text-sm md:text-base font-light"
                                    >
                                        <option value="">All Services</option>
                                        {SERVICE_TYPES.map(category => (
                                            <option key={category} value={category} className="bg-darkgray">{category}</option>
                                        ))}
                                    </select>
                                    <div className="pointer-events-none absolute inset-y-0 right-0 flex items-center px-4 text-gold-500">
                                        <svg className="fill-current h-4 w-4" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20"><path d="M9.293 12.95l.707.707L15.657 8l-1.414-1.414L10 10.828 5.757 6.586 4.343 8z" /></svg>
                                    </div>
                                </div>

                                <div className="relative">
                                    <select
                                        value={selectedStyle}
                                        onChange={(e) => setSelectedStyle(e.target.value)}
                                        className="w-full appearance-none px-4 py-3 md:py-4 bg-darkgray/80 border border-gold-900/30 rounded-xl focus:ring-2 focus:ring-gold-500/50 outline-none text-gold-100 text-sm md:text-base font-light"
                                    >
                                        <option value="">All Styles</option>
                                        {STYLES.map(style => (
                                            <option key={style} value={style} className="bg-darkgray">{style}</option>
                                        ))}
                                    </select>
                                    <div className="pointer-events-none absolute inset-y-0 right-0 flex items-center px-4 text-gold-500">
                                        <svg className="fill-current h-4 w-4" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20"><path d="M9.293 12.95l.707.707L15.657 8l-1.414-1.414L10 10.828 5.757 6.586 4.343 8z" /></svg>
                                    </div>
                                </div>
                            </div>
                        </div>

                        {/* Seasonal Collection */}
                        {seasonalConfig.isActive && seasonalDesigns.length > 0 && (
                            <section className="mb-20 max-w-7xl mx-auto">
                                <div className="flex items-center gap-4 mb-10">
                                    <div className="h-px bg-blush-200 flex-1"></div>
                                    <h2 className="text-4xl font-serif font-bold text-charcoal text-center tracking-wide">
                                        <span className="italic font-light text-blush-600 mr-2">The</span>
                                        {seasonalConfig.eventName}
                                    </h2>
                                    <div className="h-px bg-blush-200 flex-1"></div>
                                </div>
                                <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-10">
                                    {seasonalDesigns.map((design, i) => (
                                        <div key={design.id} className="animate-fade-in-up" style={{ animationDelay: `${i * 0.1}s` }}>
                                            <DesignCard design={design} onClick={() => setSelectedDesign(design)} />
                                        </div>
                                    ))}
                                </div>
                            </section>
                        )}

                        {/* Regular Gallery */}
                        <section className="max-w-7xl mx-auto">
                            <div className="flex items-center gap-4 mb-10">
                                <div className="h-px bg-charcoal/10 flex-1"></div>
                                <h2 className="text-3xl font-serif text-charcoal tracking-wide">Studio <span className="italic text-blush-600">Gallery</span></h2>
                                <div className="h-px bg-charcoal/10 flex-1"></div>
                            </div>
                            {regularDesigns.length === 0 ? (
                                <div className="text-center py-20 lg:py-32 glass-card rounded-3xl max-w-2xl mx-auto border-gold-900/30">
                                    <Search className="w-12 h-12 text-gold-700 mx-auto mb-4" />
                                    <p className="text-xl text-gold-300 font-serif">No designs found</p>
                                    <p className="text-gold-100/50 mt-2 font-light">Try adjusting your luxury filters</p>
                                </div>
                            ) : (
                                <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6 md:gap-8">
                                    {regularDesigns.map((design, i) => (
                                        <div key={design.id} className="animate-fade-in-up" style={{ animationDelay: `${i * 0.05}s` }}>
                                            <DesignCard design={design} onClick={() => setSelectedDesign(design)} />
                                        </div>
                                    ))}
                                </div>
                            )}
                        </section>
                    </main>
                    <DesignModal design={selectedDesign} onClose={() => setSelectedDesign(null)} />
                </div>
            );
        };

        // Card Component
        const DesignCard = ({ design, onClick }) => (
            <div onClick={onClick} className="group glass-card rounded-3xl overflow-hidden hover:gold-glow transition-all duration-500 hover:-translate-y-2 flex flex-col h-full bg-darkgray/80 relative cursor-pointer">
                <div className="aspect-square relative flex items-center justify-center overflow-hidden bg-blackbg">
                    <img
                        src={design.imageUrl}
                        alt={design.title}
                        className="w-full h-full object-contain transition-transform duration-700 group-hover:scale-105"
                        loading="lazy"
                    />
                    <div className="absolute inset-0 bg-gradient-to-t from-blackbg via-transparent to-transparent opacity-60 md:opacity-0 group-hover:opacity-100 transition-opacity duration-500"></div>
                </div>

                <div className="p-5 md:p-6 flex flex-col flex-1 relative z-10 border-t border-gold-900/30">
                    <div className="flex justify-between items-start mb-3 md:mb-4 gap-2">
                        <h3 className="text-lg md:text-xl font-serif font-bold text-gold-100 group-hover:text-gold-300 transition-colors">{design.title}</h3>
                        <p className="text-lg md:text-2xl font-serif text-gold-500 font-bold whitespace-nowrap">₹{design.price} <span className="text-xs font-sans text-gold-500/70 font-normal">onwards</span></p>
                    </div>
                    <div className="flex flex-wrap gap-2 mt-auto pt-3 md:pt-4 border-t border-gold-900/10">
                        {design.category && (
                            <span className="px-3 py-1 bg-gold-900/20 text-gold-300 font-medium text-xs rounded-full border border-gold-500/20">
                                {design.category}
                            </span>
                        )}
                        {(design.tags || []).map(tag => (
                            <span key={tag} className="px-3 py-1 bg-darkgray text-gold-100/70 font-medium text-xs rounded-full border border-gold-900/30">
                                {tag}
                            </span>
                        ))}
                    </div>
                </div>
            </div>
        );

        // Admin View Component
        const AdminView = ({
            onLogout,
            onDesignAdded,
            onDesignUpdated,
            onDesignDeleted,
            designs,
            seasonalConfig,
            onConfigUpdate
        }) => {
            const [showForm, setShowForm] = useState(false);
            const [editingDesign, setEditingDesign] = useState(null);

            return (
                <main className="container mx-auto px-4 py-8 min-h-screen">
                    <div className="flex justify-between items-center mb-8 border-b border-gold-900/30 pb-4">
                        <h2 className="text-3xl font-serif font-bold text-gold-100">Studio <span className="font-light italic text-gold-500">Dashboard</span></h2>
                        <button
                            onClick={onLogout}
                            className="px-6 py-2 bg-floral-700/20 text-floral-100 border border-floral-500/30 rounded-full hover:bg-floral-500/40 transition-colors uppercase tracking-widest text-xs font-semibold"
                        >
                            Logout
                        </button>
                    </div>

                    {/* Seasonal Config */}
                    <SeasonalConfigForm
                        seasonalConfig={seasonalConfig}
                        onConfigUpdate={onConfigUpdate}
                    />

                    {/* Add Design Button */}
                    <button
                        onClick={() => {
                            setEditingDesign(null);
                            setShowForm(true);
                        }}
                        className="mb-8 px-6 py-3 bg-gold-900/20 text-gold-100 border border-gold-500/50 rounded-lg hover:bg-gold-500 hover:text-blackbg flex items-center gap-2 transition-all font-semibold uppercase tracking-wide text-sm"
                    >
                        <Plus className="w-5 h-5" />
                        Add New Design
                    </button>

                    {/* Form Modal */}
                    {showForm && (
                        <DesignForm
                            design={editingDesign}
                            allDesigns={designs}
                            onClose={() => { setShowForm(false); setEditingDesign(null); }}
                            onSave={(design) => {
                                if (editingDesign) {
                                    onDesignUpdated(design);
                                } else {
                                    onDesignAdded(design);
                                }
                                setShowForm(false);
                                setEditingDesign(null);
                            }}
                        />
                    )}


                    {/* Designs List */}
                    <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">
                        {designs.map(design => (
                            <div key={design.id} className="bg-darkgray/80 border border-gold-900/30 rounded-xl shadow-lg overflow-hidden flex flex-col h-full">
                                <div className="aspect-square flex items-center justify-center bg-blackbg">
                                    <img
                                        src={design.imageUrl}
                                        alt={design.title}
                                        className="w-full h-full object-contain opacity-90 hover:opacity-100 transition-opacity"
                                    />
                                </div>
                                <div className="p-5 flex flex-col flex-1">
                                    <h3 className="text-xl font-serif font-bold text-gold-100 mb-2">{design.title}</h3>
                                    <p className="text-2xl font-serif text-gold-500 font-bold mb-4">₹{design.price} onwards</p>
                                    <div className="flex gap-2 mt-auto">
                                        <button
                                            onClick={() => {
                                                setEditingDesign(design);
                                                setShowForm(true);
                                            }}
                                            className="flex-1 px-4 py-2 bg-gold-900/20 text-gold-300 border border-gold-500/30 rounded-lg hover:bg-gold-900/40 hover:text-gold-100 flex items-center justify-center gap-2 transition-colors text-sm"
                                        >
                                            <Edit className="w-4 h-4" />
                                            Edit
                                        </button>
                                        <button
                                            onClick={async () => {
                                                if (confirm('Delete this design?')) {
                                                    await DB.deleteDesign(design.id);
                                                    onDesignDeleted(design.id);
                                                }
                                            }}
                                            className="flex-1 px-4 py-2 bg-floral-700/20 text-floral-300 border border-floral-500/30 rounded-lg hover:bg-floral-500/40 hover:text-white flex items-center justify-center gap-2 transition-colors text-sm"
                                        >
                                            <Trash2 className="w-4 h-4" />
                                            Delete
                                        </button>
                                    </div>
                                </div>
                            </div>
                        ))}
                    </div>
                </main>
            );
        };

        const DesignForm = ({ design, onClose, onSave, allDesigns = [] }) => {
            // form state (do NOT reference selectedImage in init)
            const [formData, setFormData] = useState({
                title: design?.title || '',
                price: design?.price ?? '',
                imageUrl: design?.imageUrl || '',
                category: design?.category || '',
                color: design?.color || '',
                tags: design?.tags || [],
                isSeasonal: design?.isSeasonal || false
            });

            // selection state (keeps track visually)
            const [selectedImage, setSelectedImage] = useState(design?.imageUrl || '');

            const normalizeUrl = (u) => {
                const m = u?.match(/img\d+/);
                return m ? m[0] : u;
            };

            // Build list of all repo images then filter out those already used
            const allImages = getAllRepoImages(TOTAL_IMAGES);
            const usedImages = allDesigns
                .filter(d => d.id !== design?.id) // allow current design's image if editing
                .map(d => normalizeUrl(d.imageUrl))
                .filter(Boolean);

            const availableImages = allImages.filter(img => !usedImages.includes(normalizeUrl(img)) || normalizeUrl(img) === normalizeUrl(design?.imageUrl));

            // keep formData.imageUrl in sync with selectedImage
            useEffect(() => {
                setFormData(prev => ({ ...prev, imageUrl: selectedImage }));
            }, [selectedImage]);

            const toggleTag = (tag) => {
                setFormData(prev => ({
                    ...prev,
                    tags: prev.tags.includes(tag) ? prev.tags.filter(t => t !== tag) : [...prev.tags, tag]
                }));
            };

            const handleSubmit = async (e) => {
                e.preventDefault();

                const finalImage = selectedImage || formData.imageUrl;
                if (!finalImage) return alert("Please select an image!");

                const payload = {
                    ...formData,
                    imageUrl: finalImage,
                    price: parseFloat(formData.price),
                    createdAt: design?.createdAt || Date.now()
                };

                try {
                    if (design) {
                        const updatedDesign = { ...payload, id: design.id };
                        await DB.updateDesign(updatedDesign);
                        onSave(updatedDesign);
                    } else {
                        const savedDesign = await DB.saveDesign(payload);
                        onSave(savedDesign);
                    }
                } catch (error) {
                    alert('Error saving design: ' + (error.message || error));
                }
            };

            return (
                <div className="fixed inset-0 bg-black/80 backdrop-blur-sm flex items-center justify-center p-4 z-50">
                    <div className="bg-darkgray border border-gold-900/30 rounded-2xl p-6 md:p-8 max-w-2xl w-full max-h-[90vh] overflow-y-auto shadow-2xl">
                        <div className="flex justify-between items-center mb-8 border-b border-gold-900/20 pb-4">
                            <h3 className="text-2xl font-serif font-bold text-gold-100">
                                {design ? 'Edit Design Form' : 'Add New Design'}
                            </h3>
                            <button onClick={onClose} className="hover:rotate-90 transition-transform"><X className="w-6 h-6 text-gold-500/50 hover:text-gold-300" /></button>
                        </div>

                        <form onSubmit={handleSubmit} className="space-y-6">
                            <div>
                                <label className="text-gold-500/70 text-xs uppercase tracking-widest pl-1 mb-1 block">Design Title</label>
                                <input
                                    type="text"
                                    placeholder="E.g., Rose Gold French"
                                    value={formData.title}
                                    onChange={(e) => setFormData({ ...formData, title: e.target.value })}
                                    className="w-full px-4 py-3 bg-blackbg border border-gold-900/30 rounded-xl focus:ring-2 focus:ring-gold-500/50 outline-none text-gold-100 placeholder-gold-500/20 transition-all font-light"
                                    required
                                />
                            </div>

                            <div>
                                <label className="text-gold-500/70 text-xs uppercase tracking-widest pl-1 mb-1 block">Base Price (₹)</label>
                                <input
                                    type="number"
                                    placeholder="Starting price"
                                    value={formData.price}
                                    onChange={(e) => setFormData({ ...formData, price: e.target.value })}
                                    className="w-full px-4 py-3 bg-blackbg border border-gold-900/30 rounded-xl focus:ring-2 focus:ring-gold-500/50 outline-none text-gold-100 placeholder-gold-500/20 transition-all font-light"
                                    required
                                />
                            </div>

                            {/* IMAGE SELECTION GRID */}
                            <div className="bg-blackbg/50 p-4 rounded-xl border border-gold-900/20">
                                <label className="block text-xs uppercase tracking-widest text-gold-500/70 mb-3">
                                    Select Image from Repository
                                </label>

                                {availableImages.length === 0 && (
                                    <p className="text-floral-300 text-sm mb-3 font-light">
                                        All images are already linked to designs.
                                    </p>
                                )}

                                <div className="grid grid-cols-3 gap-3 md:gap-4 max-h-60 overflow-y-auto p-2">
                                    {availableImages.map((url) => (
                                        <div
                                            key={url}
                                            className={`cursor-pointer rounded-lg overflow-hidden border-2 transition-all duration-300 ${normalizeUrl(selectedImage) === normalizeUrl(url) ? "border-gold-500 scale-105 shadow-lg shadow-gold-500/20" : "border-transparent opacity-60 hover:opacity-100"}`}
                                            onClick={() => setSelectedImage(url)}
                                        >
                                            <img src={url} className="w-full h-24 object-cover" />
                                        </div>
                                    ))}
                                </div>

                                {selectedImage && <p className="text-xs text-gold-300 mt-3 font-mono border-t border-gold-900/30 pt-2">Selected: {selectedImage.split('/').pop()}</p>}
                            </div>

                            <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
                                <div>
                                    <label className="text-gold-500/70 text-xs uppercase tracking-widest pl-1 mb-1 block">Service Type</label>
                                    <select
                                        value={formData.category}
                                        onChange={(e) => setFormData({ ...formData, category: e.target.value })}
                                        className="w-full px-4 py-3 bg-blackbg border border-gold-900/30 rounded-xl focus:ring-2 focus:ring-gold-500/50 outline-none text-gold-100 font-light"
                                    >
                                        <option value="" className="bg-darkgray">Select Service</option>
                                        {SERVICE_TYPES.map(service => <option key={service} value={service} className="bg-darkgray">{service}</option>)}
                                    </select>
                                </div>
                                <div>
                                    <label className="text-gold-500/70 text-xs uppercase tracking-widest pl-1 mb-1 block">Color Palette</label>
                                    <select
                                        value={formData.color}
                                        onChange={(e) => setFormData({ ...formData, color: e.target.value })}
                                        className="w-full px-4 py-3 bg-blackbg border border-gold-900/30 rounded-xl focus:ring-2 focus:ring-gold-500/50 outline-none text-gold-100 font-light"
                                    >
                                        <option value="" className="bg-darkgray">Select Color</option>
                                        {COLORS.map(color => (
                                            <option key={color} value={color} className="bg-darkgray">{color}</option>
                                        ))}
                                    </select>
                                </div>
                            </div>

                            <div>
                                <label className="text-gold-500/70 text-xs uppercase tracking-widest pl-1 mb-2 block">Style Tags</label>
                                <div className="flex flex-wrap gap-2">
                                    {STYLES.map(style => (
                                        <button
                                            key={style}
                                            type="button"
                                            onClick={() => toggleTag(style)}
                                            className={`px-4 py-2 rounded-full text-xs uppercase tracking-wider font-semibold transition-all border ${formData.tags.includes(style) ? 'bg-gold-500 text-blackbg border-gold-500 shadow-[0_0_10px_rgba(212,175,55,0.3)]' : 'bg-blackbg text-gold-500/50 border-gold-900/30 hover:border-gold-500 hover:text-gold-300'}`}
                                        >
                                            {style}
                                        </button>
                                    ))}
                                </div>
                            </div>

                            <label className="flex items-center gap-3 cursor-pointer group mt-4">
                                <input
                                    type="checkbox"
                                    checked={formData.isSeasonal}
                                    onChange={(e) => setFormData({ ...formData, isSeasonal: e.target.checked })}
                                    className="w-5 h-5 accent-gold-500 rounded border border-gold-900"
                                />
                                <span className="text-sm text-gold-300 group-hover:text-gold-100 transition-colors uppercase tracking-widest">Mark as Exclusive / Seasonal</span>
                            </label>

                            <button type="submit" className="w-full bg-gold-500 text-blackbg py-4 rounded-xl hover:bg-gold-300 transition-colors uppercase tracking-widest font-bold text-sm mt-8 shadow-lg shadow-gold-500/20">
                                {design ? 'Update Design' : 'Add New Design'}
                            </button>
                        </form>
                    </div>
                </div>
            );
        };

        // Seasonal Config Form Component
        const SeasonalConfigForm = ({ seasonalConfig, onConfigUpdate }) => {
            const [config, setConfig] = useState(seasonalConfig);

            const handleSubmit = async (e) => {
                e.preventDefault();
                await DB.saveSeasonalConfig(config);
                onConfigUpdate(config);
            };

            return (
                <form onSubmit={handleSubmit} className="bg-darkgray/80 border border-gold-900/30 rounded-2xl p-6 md:p-8 mb-8 shadow-2xl relative overflow-hidden">
                    <div className="absolute top-0 right-0 w-32 h-32 bg-floral-700/20 rounded-full filter blur-[50px] pointer-events-none"></div>
                    <div className="relative z-10">
                        <h3 className="text-xl font-serif font-bold text-gold-100 mb-6 flex items-center gap-3">
                            <Sparkles className="w-5 h-5 text-gold-500" />
                            Seasonal Collection Banner
                        </h3>
                        <div className="space-y-6">
                            <label className="flex items-center gap-3 cursor-pointer group w-fit">
                                <input
                                    type="checkbox"
                                    checked={config.isActive}
                                    onChange={(e) => setConfig({ ...config, isActive: e.target.checked })}
                                    className="w-5 h-5 accent-gold-500 border border-gold-900"
                                />
                                <span className="text-sm text-gold-300 uppercase tracking-widest group-hover:text-gold-100 transition-colors">Activate Highlight Banner</span>
                            </label>

                            {config.isActive && (
                                <input
                                    type="text"
                                    placeholder="E.g., The Elite Gold Collection"
                                    value={config.eventName}
                                    onChange={(e) => setConfig({ ...config, eventName: e.target.value })}
                                    className="w-full max-w-md px-5 py-3 bg-blackbg border border-gold-900/30 rounded-xl focus:ring-2 focus:ring-gold-500/50 outline-none text-gold-100 placeholder-gold-500/30 transition-all font-light"
                                />
                            )}

                            <button
                                type="submit"
                                className="px-6 py-3 bg-floral-700 text-floral-100 border border-floral-500/30 rounded-xl hover:bg-floral-500 hover:text-white transition-colors text-sm uppercase tracking-widest font-semibold"
                            >
                                Apply Changes
                            </button>
                        </div>
                    </div>
                </form>
            );
        };

        // Main App Component
        const App = () => {
            const [view, setView] = useState('client');
            const [designs, setDesigns] = useState([]);
            const [seasonalConfig, setSeasonalConfig] = useState({ isActive: false, eventName: '' });
            const [loading, setLoading] = useState(true);
            const [password, setPassword] = useState('');
            const [loginError, setLoginError] = useState(false);
            const [verifying, setVerifying] = useState(false);

            useEffect(() => {
                const fetchData = async () => {
                    setLoading(true);
                    const [fetchedDesigns, fetchedConfig] = await Promise.all([
                        DB.getDesigns(),
                        DB.getSeasonalConfig()
                    ]);

                    // Normalize all legacy database designs to use the local /img/ file structure dynamically without overriding their db value
                    const mappedDesigns = fetchedDesigns.map((d) => {
                        const match = d?.imageUrl?.match(/img\d+/);
                        return match ? { ...d, imageUrl: `/img/${match[0]}.jpg` } : d;
                    });

                    setDesigns(mappedDesigns);
                    setSeasonalConfig(fetchedConfig);
                    setLoading(false);
                };
                fetchData();
            }, []);

            const handleLogin = async (e) => {
                e.preventDefault();
                setVerifying(true);
                const isValid = await DB.checkLogin(password);
                setVerifying(false);

                if (isValid) {
                    setView('admin');
                    setPassword('');
                    setLoginError(false);
                } else {
                    setLoginError(true);
                }
            };



            if (loading) {
                return (
                    <div className="min-h-screen flex items-center justify-center bg-blackbg">
                        <Loader2 className="w-8 h-8 text-gold-500" />
                    </div>
                );
            }

            return (
                <div className="min-h-screen bg-blackbg relative">
                    <Header
                        onAdminClick={() => setView(view === 'admin' ? 'client' : 'login')}
                        onHomeClick={() => setView('client')}
                    />

                    {view === 'client' && (
                        <ClientView designs={designs} seasonalConfig={seasonalConfig} />
                    )}

                    {view === 'login' && (
                        <div className="min-h-screen flex items-center justify-center px-4 relative z-20 -mt-20">
                            <div className="glass-card p-8 md:p-10 rounded-[2rem] shadow-2xl w-full max-w-md animate-fade-in-up border border-gold-900/30 relative overflow-hidden">
                                <div className="absolute top-0 right-0 -mt-10 -mr-10 w-40 h-40 bg-floral-700 rounded-full filter blur-[80px] opacity-40"></div>
                                <div className="absolute bottom-0 left-0 -mb-10 -ml-10 w-40 h-40 bg-gold-900 rounded-full filter blur-[80px] opacity-20"></div>

                                <div className="text-center mb-8 relative z-10">
                                    <div className="bg-darkgray/80 w-16 h-16 rounded-full flex items-center justify-center mx-auto mb-4 shadow-sm border border-gold-500/30">
                                        <Lock className="w-8 h-8 text-gold-500" />
                                    </div>
                                    <h2 className="text-2xl md:text-3xl font-serif font-bold text-gold-100 uppercase tracking-widest">Studio Access</h2>
                                    <p className="text-gold-500/70 text-sm mt-2 font-light">Enter artist passphrase</p>
                                </div>

                                <form onSubmit={handleLogin} className="space-y-6 relative z-10">
                                    <div>
                                        <input
                                            type="password"
                                            value={password}
                                            onChange={(e) => setPassword(e.target.value)}
                                            className="w-full px-5 py-4 rounded-2xl bg-darkgray/80 border border-gold-900/30 focus:border-gold-500 focus:ring-2 focus:ring-gold-500/40 outline-none transition-all placeholder:text-gold-500/40 font-light text-gold-100"
                                            placeholder="Password"
                                            autoFocus
                                        />
                                        {loginError && <p className="text-floral-300 text-xs mt-2 pl-2 tracking-wide text-shadow">Incorrect password. Please try again.</p>}
                                    </div>

                                    <button
                                        type="submit"
                                        disabled={verifying}
                                        className="btn-premium w-full font-bold tracking-widest py-4 rounded-2xl flex justify-center items-center text-sm uppercase text-blackbg"
                                    >
                                        {verifying ? <Loader2 className="w-5 h-5" /> : "Unlock"}
                                    </button>
                                </form>
                                <button
                                    onClick={() => setView('client')}
                                    className="w-full mt-6 text-gold-500/50 text-xs md:text-sm hover:text-gold-300 transition-colors uppercase tracking-[0.2em] font-medium relative z-10"
                                >
                                    Return to Gallery
                                </button>
                            </div>
                        </div>
                    )}

                    {view === 'admin' && (
                        <AdminView
                            onLogout={() => setView('client')}
                            onDesignAdded={(design) => setDesigns(prev => [design, ...prev])}
                            onDesignUpdated={(design) => setDesigns(prev => prev.map(d => d.id === design.id ? design : d))}
                            onDesignDeleted={(id) => setDesigns(prev => prev.filter(d => d.id !== id))}
                            designs={designs}
                            seasonalConfig={seasonalConfig}
                            onConfigUpdate={setSeasonalConfig}
                        />
                    )}
                </div>
            );
        };

        // Render the app
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
